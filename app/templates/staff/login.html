{% extends "base.html" %}
{% block title %}{{ restaurant.name }} - Staff Login{% endblock %}
{% block content %}
<div class="container" style="max-width: 400px; margin-top: 4rem;">
    <div class="card" style="padding: 2rem;">
        <h1 style="text-align: center; margin-bottom: 1.5rem;">{{ restaurant.name }}</h1>
        <h2 style="text-align: center; font-size: 1.1rem; color: #666; margin-bottom: 2rem;">Staff Login</h2>
        {% if error %}
        <div style="background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}
        <form method="post">
            <input type="password" name="password" placeholder="Staff password" required
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
